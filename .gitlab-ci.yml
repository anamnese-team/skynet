stages:
  - build

.build_template:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  tags:
    - saas-linux-large-amd64
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+-gitlab$/'
    - when: never
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --cache=true
      --cache-repo "${CI_REGISTRY_IMAGE}/cache-${IMAGE_FLAVOR}"
      --build-arg "BASE_IMAGE_BUILD=${BASE_IMAGE_BUILD}"
      --build-arg "BASE_IMAGE_RUN=${BASE_IMAGE_RUN}"
      --build-arg "BUILD_WITH_VLLM=${BUILD_WITH_VLLM}"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}-${IMAGE_FLAVOR}"

build_gpu:
  extends: .build_template
  variables:
    IMAGE_FLAVOR: gpu
    BASE_IMAGE_BUILD: nvidia/cuda:12.2.2-cudnn8-devel-ubuntu22.04
    BASE_IMAGE_RUN: nvidia/cuda:12.2.2-cudnn8-runtime-ubuntu22.04
    BUILD_WITH_VLLM: "1"

build_cpu:
  extends: .build_template
  variables:
    IMAGE_FLAVOR: cpu
    BASE_IMAGE_BUILD: ubuntu:22.04
    BASE_IMAGE_RUN: ubuntu:22.04
    BUILD_WITH_VLLM: "0"
